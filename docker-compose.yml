version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: lis
      POSTGRES_USER: lis
      POSTGRES_PASSWORD: lis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
    environment:
      LIS_DATABASE_URL: postgresql+psycopg://lis:lis@db:5432/lis
      LIS_JWT_SECRET: change-me-in-prod
      LIS_ACCESS_TOKEN_EXPIRE_MINUTES: "480"
      LIS_AUTO_CREATE_SCHEMA: "false"
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  postgres_data:
