openapi: 3.1.0
info:
  title: LIS Internal API
  version: 0.1.0
  summary: Internal operational contract for the first LIS workflow slice
  description: >
    Contract-first API for the starter LIS v1 implementation. This surface focuses on
    order intake, specimen lifecycle, and work queue orchestration.
servers:
  - url: /
tags:
  - name: system
  - name: orders
  - name: specimens
  - name: tasks
paths:
  /health:
    get:
      tags: [system]
      summary: Read service health
      operationId: getHealth
      responses:
        "200":
          description: Service health response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/orders:
    post:
      tags: [orders]
      summary: Create an order with one or more requested tests
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      tags: [orders]
      summary: Search orders
      operationId: listOrders
      parameters:
        - name: requisition_no
          in: query
          schema:
            type: string
        - name: patient_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Matching orders
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrderSummary"
  /api/v1/orders/{order_id}:
    get:
      tags: [orders]
      summary: Read one order
      operationId: getOrder
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/orders/{order_id}/items:
    post:
      tags: [orders]
      summary: Add an item to an existing order
      operationId: createOrderItem
      parameters:
        - $ref: "#/components/parameters/OrderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderItemRequest"
      responses:
        "201":
          description: Order item accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderItemSummary"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/order-items/{order_item_id}/cancel:
    post:
      tags: [orders]
      summary: Cancel one order item
      operationId: cancelOrderItem
      parameters:
        - $ref: "#/components/parameters/OrderItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderItemActionRequest"
      responses:
        "200":
          description: Order item status changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderItemSummary"
  /api/v1/order-items/{order_item_id}/hold:
    post:
      tags: [orders]
      summary: Put one order item on hold
      operationId: holdOrderItem
      parameters:
        - $ref: "#/components/parameters/OrderItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderItemActionRequest"
      responses:
        "200":
          description: Order item status changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderItemSummary"
  /api/v1/specimens/accession:
    post:
      tags: [specimens]
      summary: Create and accession a new specimen
      operationId: accessionSpecimen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessionSpecimenRequest"
      responses:
        "201":
          description: Specimen accessioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecimenSummary"
  /api/v1/specimens/{specimen_id}/collect:
    post:
      tags: [specimens]
      summary: Mark a specimen as collected
      operationId: collectSpecimen
      parameters:
        - $ref: "#/components/parameters/SpecimenId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectSpecimenRequest"
      responses:
        "200":
          description: Specimen state updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecimenSummary"
  /api/v1/specimens/{specimen_id}/receive:
    post:
      tags: [specimens]
      summary: Mark a specimen as received
      operationId: receiveSpecimen
      parameters:
        - $ref: "#/components/parameters/SpecimenId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiveSpecimenRequest"
      responses:
        "200":
          description: Specimen state updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecimenSummary"
  /api/v1/specimens/{specimen_id}/accept:
    post:
      tags: [specimens]
      summary: Accept a received specimen
      operationId: acceptSpecimen
      parameters:
        - $ref: "#/components/parameters/SpecimenId"
      responses:
        "200":
          description: Specimen state updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecimenSummary"
  /api/v1/specimens/{specimen_id}/reject:
    post:
      tags: [specimens]
      summary: Reject a specimen
      operationId: rejectSpecimen
      parameters:
        - $ref: "#/components/parameters/SpecimenId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectSpecimenRequest"
      responses:
        "200":
          description: Specimen state updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecimenSummary"
  /api/v1/specimens/{specimen_id}/aliquot:
    post:
      tags: [specimens]
      summary: Create a child aliquot from a specimen
      operationId: aliquotSpecimen
      parameters:
        - $ref: "#/components/parameters/SpecimenId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AliquotSpecimenRequest"
      responses:
        "201":
          description: Child specimen created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecimenSummary"
  /api/v1/specimens/{specimen_id}/move:
    post:
      tags: [specimens]
      summary: Move a specimen container to another storage location
      operationId: moveSpecimen
      parameters:
        - $ref: "#/components/parameters/SpecimenId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveSpecimenRequest"
      responses:
        "200":
          description: Specimen state updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecimenSummary"
  /api/v1/specimens/{specimen_id}/trace:
    get:
      tags: [specimens]
      summary: Read the specimen event trail
      operationId: getSpecimenTrace
      parameters:
        - $ref: "#/components/parameters/SpecimenId"
      responses:
        "200":
          description: Traceability view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecimenTraceResponse"
  /api/v1/tasks:
    post:
      tags: [tasks]
      summary: Create a work task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Task accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSummary"
    get:
      tags: [tasks]
      summary: Search tasks by queue or status
      operationId: listTasks
      parameters:
        - name: queue
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: owner_user_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Matching tasks
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/TaskSummary"
  /api/v1/tasks/{task_id}/claim:
    post:
      tags: [tasks]
      summary: Claim a task for a user
      operationId: claimTask
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskActionRequest"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSummary"
  /api/v1/tasks/{task_id}/start:
    post:
      tags: [tasks]
      summary: Start work on a claimed task
      operationId: startTask
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskActionRequest"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSummary"
  /api/v1/tasks/{task_id}/pause:
    post:
      tags: [tasks]
      summary: Pause work on a task
      operationId: pauseTask
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskActionRequest"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSummary"
  /api/v1/tasks/{task_id}/complete:
    post:
      tags: [tasks]
      summary: Complete a task
      operationId: completeTask
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskActionRequest"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSummary"
  /api/v1/tasks/{task_id}/fail:
    post:
      tags: [tasks]
      summary: Fail a task with a reason
      operationId: failTask
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskActionRequest"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSummary"
components:
  parameters:
    OrderId:
      name: order_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrderItemId:
      name: order_item_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SpecimenId:
      name: specimen_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      name: task_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Invalid request payload
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
  schemas:
    HealthResponse:
      type: object
      required: [service, status, version, contract_path]
      properties:
        service:
          type: string
        status:
          type: string
        version:
          type: string
        contract_path:
          type: string
    ApiError:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
    CreateOrderRequest:
      type: object
      required:
        - patient_id
        - source_system
        - priority
        - ordered_at
        - items
      properties:
        patient_id:
          type: string
          format: uuid
        encounter_case_id:
          type: string
          format: uuid
        source_system:
          type: string
        placer_order_no:
          type: string
        priority:
          type: string
          enum: [routine, urgent, asap, stat]
        clinical_info:
          type: string
        requested_by_practitioner_role_id:
          type: string
          format: uuid
        ordered_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CreateOrderItemRequest"
    CreateOrderItemRequest:
      type: object
      required:
        - test_catalog_id
      properties:
        test_catalog_id:
          type: string
          format: uuid
        requested_specimen_type_code:
          type: string
        priority:
          type: string
          enum: [routine, urgent, asap, stat]
        reflex_policy_code:
          type: string
        aoe_payload:
          type: object
          additionalProperties: true
    OrderSummary:
      type: object
      required:
        - id
        - requisition_no
        - patient_id
        - source_system
        - priority
        - status
        - ordered_at
      properties:
        id:
          type: string
          format: uuid
        requisition_no:
          type: string
        patient_id:
          type: string
          format: uuid
        source_system:
          type: string
        priority:
          type: string
        status:
          type: string
        ordered_at:
          type: string
          format: date-time
    OrderDetail:
      allOf:
        - $ref: "#/components/schemas/OrderSummary"
        - type: object
          properties:
            encounter_case_id:
              type: string
              format: uuid
            clinical_info:
              type: string
            items:
              type: array
              items:
                $ref: "#/components/schemas/OrderItemSummary"
    OrderItemSummary:
      type: object
      required:
        - id
        - order_id
        - line_no
        - test_catalog_id
        - status
      properties:
        id:
          type: string
          format: uuid
        order_id:
          type: string
          format: uuid
        line_no:
          type: integer
        test_catalog_id:
          type: string
          format: uuid
        requested_specimen_type_code:
          type: string
        status:
          type: string
        priority:
          type: string
    OrderItemActionRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
        comment:
          type: string
    AccessionSpecimenRequest:
      type: object
      required:
        - order_id
        - patient_id
        - specimen_type_code
      properties:
        order_id:
          type: string
          format: uuid
        patient_id:
          type: string
          format: uuid
        parent_specimen_id:
          type: string
          format: uuid
        specimen_type_code:
          type: string
        source_location_id:
          type: string
          format: uuid
        notes:
          type: string
        metadata:
          type: object
          additionalProperties: true
    CollectSpecimenRequest:
      type: object
      required: [collected_at]
      properties:
        collected_at:
          type: string
          format: date-time
        collected_by_practitioner_role_id:
          type: string
          format: uuid
        container_barcodes:
          type: array
          items:
            type: string
    ReceiveSpecimenRequest:
      type: object
      required: [received_at]
      properties:
        received_at:
          type: string
          format: date-time
        location_id:
          type: string
          format: uuid
    RejectSpecimenRequest:
      type: object
      required: [rejection_reason_code]
      properties:
        rejection_reason_code:
          type: string
        notes:
          type: string
    AliquotSpecimenRequest:
      type: object
      required: [container_type_code]
      properties:
        container_type_code:
          type: string
        barcode:
          type: string
        volume_value:
          type: number
        volume_ucum:
          type: string
        notes:
          type: string
    MoveSpecimenRequest:
      type: object
      required: [storage_location_id]
      properties:
        storage_location_id:
          type: string
          format: uuid
        position_code:
          type: string
        comment:
          type: string
    SpecimenSummary:
      type: object
      required:
        - id
        - accession_no
        - order_id
        - patient_id
        - specimen_type_code
        - status
      properties:
        id:
          type: string
          format: uuid
        accession_no:
          type: string
        order_id:
          type: string
          format: uuid
        patient_id:
          type: string
          format: uuid
        specimen_type_code:
          type: string
        status:
          type: string
        collected_at:
          type: string
          format: date-time
        received_at:
          type: string
          format: date-time
    SpecimenTraceEvent:
      type: object
      required: [event_type, occurred_at]
      properties:
        event_type:
          type: string
        occurred_at:
          type: string
          format: date-time
        performed_by_user_id:
          type: string
          format: uuid
        location_id:
          type: string
          format: uuid
        details:
          type: object
          additionalProperties: true
    SpecimenTraceResponse:
      type: object
      required: [specimen, events]
      properties:
        specimen:
          $ref: "#/components/schemas/SpecimenSummary"
        events:
          type: array
          items:
            $ref: "#/components/schemas/SpecimenTraceEvent"
    CreateTaskRequest:
      type: object
      required:
        - focus_type
        - focus_id
        - queue_code
        - status
      properties:
        group_identifier:
          type: string
        based_on_order_item_id:
          type: string
          format: uuid
        focus_type:
          type: string
          enum: [order-item, specimen, observation, report]
        focus_id:
          type: string
          format: uuid
        queue_code:
          type: string
        status:
          type: string
        business_status:
          type: string
        priority:
          type: string
        owner_user_id:
          type: string
          format: uuid
        owner_practitioner_role_id:
          type: string
          format: uuid
        device_id:
          type: string
          format: uuid
        due_at:
          type: string
          format: date-time
        inputs:
          type: object
          additionalProperties: true
    TaskActionRequest:
      type: object
      properties:
        owner_user_id:
          type: string
          format: uuid
        owner_practitioner_role_id:
          type: string
          format: uuid
        business_status:
          type: string
        reason:
          type: string
        comment:
          type: string
        outputs:
          type: object
          additionalProperties: true
    TaskSummary:
      type: object
      required:
        - id
        - focus_type
        - focus_id
        - queue_code
        - status
        - authored_on
      properties:
        id:
          type: string
          format: uuid
        group_identifier:
          type: string
        based_on_order_item_id:
          type: string
          format: uuid
        focus_type:
          type: string
        focus_id:
          type: string
          format: uuid
        queue_code:
          type: string
        status:
          type: string
        business_status:
          type: string
        priority:
          type: string
        owner_user_id:
          type: string
          format: uuid
        authored_on:
          type: string
          format: date-time
        due_at:
          type: string
          format: date-time
