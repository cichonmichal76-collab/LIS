openapi: 3.1.0
info:
  title: LIS Core API
  summary: Starter modular monolith for a laboratory information system
  description: Internal API with working persistence for auth, master data, orders,
    specimen lifecycle, task orchestration, observations, reports, audit, provenance,
    device registry, HL7 v2 integrations, device gateway, autoverification, QC engine,
    ASTM-style drivers, analyzer transport sessions, and a read/search FHIR facade.
  version: 0.11.0
